CONFIG_NET_L2_PPP=y
CONFIG_NET_L2_PPP_TIMEOUT=3000
CONFIG_NET_L2_PPP_MAX_CONFIGURE_REQ_RETRANSMITS=10
CONFIG_NET_L2_PPP_MAX_TERMINATE_REQ_RETRANSMITS=2
CONFIG_NET_L2_PPP_MAX_NACK_LOOPS=5
# CONFIG_NET_L2_PPP_PAP is not set
# CONFIG_NET_L2_PPP_OPTION_MRU is not set
CONFIG_NET_L2_PPP_OPTION_MAX_MRU=1500
# CONFIG_NET_L2_PPP_OPTION_SERVE_IP is not set
# CONFIG_NET_L2_PPP_OPTION_SERVE_DNS is not set
# CONFIG_NET_L2_PPP_MGMT is not set
CONFIG_NET_L2_PPP_TX_STACK_SIZE=1024
CONFIG_NET_L2_PPP_THREAD_PRIO=1
# CONFIG_NET_DEFAULT_IF_PPP is not set


CONFIG_NET_DRIVERS=y

CONFIG_NET_PPP=y
CONFIG_NET_PPP_DRV_NAME="ppp"
CONFIG_NET_PPP_MTU_MRU=1500
CONFIG_NET_PPP_UART_BUF_LEN=8
CONFIG_NET_PPP_RINGBUF_SIZE=256
CONFIG_NET_PPP_RX_STACK_SIZE=2048
CONFIG_NET_PPP_RX_PRIORITY=7
CONFIG_NET_PPP_VERIFY_FCS=y
CONFIG_NET_PPP_LOG_LEVEL_DEFAULT=y
CONFIG_PPP_MAC_ADDR=""

CONFIG_CRC=y
CONFIG_CRC_LOG_LEVEL_DEFAULT=y
# CONFIG_CRC_HW_HANDLER is not set
# CONFIG_CRC32_K_4_2_TABLE_256 is not set
# CONFIG_CRC_SHELL is not set



# See https://docs.zephyrproject.org/latest/connectivity/networking/net_config_guide.html#network-buffer-configuration-options
# Default 4
CONFIG_NET_PKT_RX_COUNT=4
# Default 4
CONFIG_NET_PKT_TX_COUNT=4
# Default 128
CONFIG_NET_BUF_DATA_SIZE=128 
# Default 16
CONFIG_NET_BUF_RX_COUNT=16 
# Default 16
CONFIG_NET_BUF_TX_COUNT=32 
# Default 4
CONFIG_NET_PKT_BUF_USER_DATA_SIZE=4 